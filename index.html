<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dokumentasi Proyek SSB Baturetno - Ashvin Labs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Dokumentasi resmi proyek aplikasi manajemen SSB Baturetno oleh Ashvin Labs Indonesia">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme: Vue (Sleek and Clean) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Mermaid JS (Stable 9.4.3) -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>

  <style>
    :root {
      --theme-color: #0c8245; /* Green theme matching soccer */
    }
    .markdown-section {
      max-width: 900px;
    }
    /* Style for Mermaid Diagrams to render cleanly */
    .mermaid {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      overflow-x: auto; /* Allow horizontal scrolling if overflow */
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .mermaid svg {
      max-width: none !important; /* let it grow as needed */
      min-width: 800px; /* ensure enough space for gantt chart to read easily */
      height: auto !important;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="app">Memuat Dokumentasi Proyek...</div>
  <script>
    // Initialize Mermaid
    mermaid.initialize({ 
      startOnLoad: false,
      theme: 'default'
    });

    window.$docsify = {
      name: 'SSB Baturetno',
      repo: 'https://github.com/gabrielfermy/SSBBaturetnoApp',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      // Custom Markdown compiler to intercept and tag mermaid code blocks
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return (
                '<div class="mermaid">' + code + '</div>'
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>
  
  <!-- Docsify Library -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Custom Plugin to Render Mermaid & Footer after page load -->
  <script>
    (function() {
      var mermaidPlugin = function(hook, vm) {
        hook.doneEach(function() {
          mermaid.init(undefined, '.mermaid');
        });
      };
      
      var footerPlugin = function(hook, vm) {
        hook.afterEach(function(html) {
          var footer = [
            '<hr style="margin: 40px 0 20px 0; border: 0; border-top: 1px solid #eee;" />',
            '<footer style="text-align: center; padding: 10px 0; font-size: 0.85em; color: #888;">',
            '  <span>Copyright &copy; 2026 <strong>Ashvin Labs Indonesia</strong>. All Rights Reserved.</span><br/>',
            '  <small style="color: #bbb;">SSB Baturetno App - Intellectual Property Documentation</small>',
            '</footer>'
          ].join('');
          return html + footer;
        });
      };
      
      window.$docsify.plugins = [].concat(window.$docsify.plugins || [], mermaidPlugin, footerPlugin);
    })();
  </script>
</body>
</html>
